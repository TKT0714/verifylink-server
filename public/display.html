<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VerifyLink - 複数番号表示モニター</title>
    <style>
        body { font-family: 'Meiryo UI', sans-serif; background: #dce6ff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #1e78dc; color: white; text-align: center; padding: 20px; font-size: 40px; font-weight: bold; }
        
        /* 🌟 20枠まで自動で綺麗に並ぶレスポンシブグリッド仕様に変身！ */
        .container { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; align-content: start; overflow-y: auto; }
        
        .card { background: white; border: 4px solid #fff; box-shadow: 0 6px 15px rgba(0,0,0,0.15); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; min-height: 200px; animation: popIn 0.3s ease-out; position: relative; }
        .number { font-size: 90px; font-weight: bold; color: #000; line-height: 1; }
        .subtext { font-size: 24px; color: #666; margin-top: 10px; }
        
        /* 点滅演出 */
        .flash { background: #ff3b30 !important; }
        .flash .number, .flash .subtext { color: white !important; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="header">査定が完了しました カウンターまでお越しください</div>
    <div id="monitorContainer" class="container">
        </div>

    <script>
        const socket = io();
        const container = document.getElementById('monitorContainer');

        socket.on('receive_number', (data) => {
            const cardId = `card-${data.number}`;
            let existingCard = document.getElementById(cardId);

            if (data.flag === "0") {
                // ⭕ 【追加命令の場合】
                if (!existingCard) {
                    // 新しいカードを錬成するザます！
                    const card = document.createElement('div');
                    card.id = cardId;
                    card.className = 'card';
                    
                    card.innerHTML = `
                        <div class="number">${data.number}</div>
                        <div class="subtext">${data.satei || '受付番号'}</div>
                    `;
                    
                    container.appendChild(card);
                    flashEffect(card);
                }
            } else if (data.flag === "1") {
                // ❌ 【削除命令の場合】
                if (existingCard) {
                    existingCard.remove(); // 画面から消滅
                }
            }
        });

        function flashEffect(element) {
            let count = 0;
            const interval = setInterval(() => {
                element.classList.toggle('flash');
                count++;
                if (count >= 10) {
                    clearInterval(interval);
                    element.classList.remove('flash');
                }
            }, 300);
        }
    </script>
</body>
</html>
