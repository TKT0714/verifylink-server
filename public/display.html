<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VerifyLink - ゼロエミッション汎用モニター</title>
    <style>
        body { font-family: 'Meiryo UI', sans-serif; background: #dce6ff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
        .header { background: #1e78dc; color: white; text-align: center; padding: 15px; font-size: 36px; font-weight: bold; position: relative; }
        .config-btn { position: absolute; right: 20px; top: 20px; font-size: 16px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .config-panel { display: none; position: absolute; right: 20px; top: 60px; background: white; color: black; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 9999; font-size: 16px; text-align: left; width: 280px; }
        .config-panel label { display: block; margin: 8px 0; cursor: pointer; }
        .config-panel select, .config-panel input[type="time"] { width: 100%; padding: 5px; font-size: 16px; margin: 5px 0 15px 0; box-sizing: border-box; }
        
        .main-workspace { flex: 1; display: flex; gap: 15px; padding: 15px; overflow: hidden; }
        .brand-column { flex: 1; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.6); border-radius: 15px; padding: 15px; }
        
        .brand-header { display: flex; justify-content: center; align-items: center; padding: 0; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: 70px; overflow: hidden; }
        .brand-logo { width: 100%; height: 100%; object-fit: contain; }

        .bg-hardoff { background: #00429a; }
        .bg-hobbyoff { background: #e60012; }
        .bg-offhouse { background: #016837; }
        
        .card-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; align-content: start; overflow-y: auto; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: bold; color: black; min-height: 110px; animation: popIn 0.25s ease-out; }
        .flash { background: #ff3b30 !important; color: white !important; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 🌙 画面を真っ黒にするシャッター（最前面に被せるザます） */
        .night-shutter { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000000; z-index: 99999; cursor: none; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="nightShutter" class="night-shutter"></div>

    <div class="header">
        査定が完了しました カウンターまでお越しください
        <button class="config-btn" onclick="toggleConfig()">⚙️ 画面表示設定</button>
        
        <div id="configPanel" class="config-panel">
            <strong>【設置店舗の選択】</strong>
            <select id="selStore" onchange="updateLayout()">
                <option value="owada">八王子大和田店</option>
                <option value="minamino">八王子みなみ野店</option>
                <option value="hachioji_nishi">八王子西店</option>
                <option value="tama_center">多摩センター店</option>
            </select>

            <strong>【表示ブランド】</strong><hr>
            <label><input type="checkbox" id="chkHard" checked onchange="updateLayout()"> HARD-OFF</label>
            <label><input type="checkbox" id="chkHobby" checked onchange="updateLayout()"> HOBBY-OFF</label>
            <label><input type="checkbox" id="chkOff" checked onchange="updateLayout()"> OFF-HOUSE</label>

            <strong>【🔧 タイマー自動消灯設定】</strong><hr>
            <label>開店時間（再表示）</label>
            <input type="time" id="timeOpen" value="09:45" onchange="updateLayout()">
            <label>閉店時間（暗転）</label>
            <input type="time" id="timeClose" value="20:15" onchange="updateLayout()">

            <button style="margin-top:10px; width:100%;" onclick="toggleConfig()">設定を閉じる</button>
        </div>
    </div>

    <div class="main-workspace">
        <div id="col-hardoff" class="brand-column">
            <div class="brand-header bg-hardoff"><img src="hardoff-logo.jpg" alt="HARD-OFF" class="brand-logo"></div>
            <div id="grid-hardoff" class="card-grid"></div>
        </div>
        <div id="col-hobbyoff" class="brand-column">
            <div class="brand-header bg-hobbyoff"><img src="hobbyoff-logo.jpg" alt="HOBBY-OFF" class="brand-logo"></div>
            <div id="grid-hobbyoff" class="card-grid"></div>
        </div>
        <div id="col-offhouse" class="brand-column">
            <div class="brand-header bg-offhouse"><img src="offhouse-logo.jpg" alt="OFF-HOUSE" class="brand-logo"></div>
            <div id="grid-offhouse" class="card-grid"></div>
        </div>
    </div>

    <script>
        const socket = io();

        function toggleConfig() {
            const panel = document.getElementById('configPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function updateLayout() {
            const storeId = document.getElementById('selStore').value;
            const showHard = document.getElementById('chkHard').checked;
            const showHobby = document.getElementById('chkHobby').checked;
            const showOff = document.getElementById('chkOff').checked;
            
            // 🌟 タイマー設定の時間も一緒に保存
            const timeOpen = document.getElementById('timeOpen').value;
            const timeClose = document.getElementById('timeClose').value;

            document.getElementById('col-hardoff').style.display = showHard ? 'flex' : 'none';
            document.getElementById('col-hobbyoff').style.display = showHobby ? 'flex' : 'none';
            document.getElementById('col-offhouse').style.display = showOff ? 'flex' : 'none';

            localStorage.setItem('display_config_v3', JSON.stringify({storeId, showHard, showHobby, showOff, timeOpen, timeClose}));
            checkTimeShutter(); // 時間設定が変わった瞬間にも判定を走らせるザます
        }

        // 💾 ロード処理
        const savedConfig = localStorage.getItem('display_config_v3');
        if (savedConfig) {
            const conf = JSON.parse(savedConfig);
            document.getElementById('selStore').value = conf.storeId;
            document.getElementById('chkHard').checked = conf.showHard;
            document.getElementById('chkHobby').checked = conf.showHobby;
            document.getElementById('chkOff').checked = conf.showOff;
            if(conf.timeOpen) document.getElementById('timeOpen').value = conf.timeOpen;
            if(conf.timeClose) document.getElementById('timeClose').value = conf.timeClose;
            updateLayout();
        }

        // ⏱️ 1分ごとに現在時刻をチェックして画面の白黒を判定する回路
        function checkTimeShutter() {
            const openTime = document.getElementById('timeOpen').value;
            const closeTime = document.getElementById('timeClose').value;
            if (!openTime || !closeTime) return;

            const now = new Date();
            const currentHM = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const shutter = document.getElementById('nightShutter');

            // 跨ぎ運用（例：09:45 〜 20:15 が営業）に対応する時間判定ロジックザます
            let isClosed = false;
            if (openTime < closeTime) {
                // 通常の昼間営業（例：09:45〜20:15以外は真っ黒）
                if (currentHM < openTime || currentHM >= closeTime) isClosed = true;
            } else {
                // 夜間跨ぎ営業（一応対応）
                if (currentHM >= closeTime && currentHM < openTime) isClosed = true;
            }

            // 💻 シャッターのON/OFF
            shutter.style.display = isClosed ? 'block' : 'none';
        }

        // 1分周期で自動監視スタート
        setInterval(checkTimeShutter, 60000);
        checkTimeShutter(); // 起動時に即時1回実行

        socket.on('receive_number', (data) => {
            const currentStoreId = document.getElementById('selStore').value;
            if (data.storeId !== currentStoreId) return; 

            const cardId = `card-${data.number}`;
            const existingCard = document.getElementById(cardId);

            if (data.flag === "0") {
                if (!existingCard) {
                    const mode = data.satei || ""; 
                    let targetGridId = "grid-hardoff";

                    if (mode.includes("ホビーオフ")) targetGridId = "grid-hobbyoff";
                    else if (mode.includes("オフハウス")) targetGridId = "grid-offhouse";

                    const targetGrid = document.getElementById(targetGridId);
                    if (targetGrid) {
                        const card = document.createElement('div');
                        card.id = cardId; card.className = 'card'; card.innerText = data.number;
                        targetGrid.appendChild(card);
                        flashEffect(card);
                    }
                }
            } else if (data.flag === "1" && existingCard) {
                existingCard.remove();
            }
        });

        function flashEffect(element) {
            let count = 0;
            const interval = setInterval(() => {
                element.classList.toggle('flash'); count++;
                if (count >= 10) { clearInterval(interval); element.classList.remove('flash'); }
            }, 300);
        }
    </script>
</body>
</html>
